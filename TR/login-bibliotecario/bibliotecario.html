<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <script>
    (function() {
        try {
            var salvo = localStorage.getItem('libro-tema');
            var prefereEscuro = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            var tema = salvo || (prefereEscuro ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', tema);
        } catch (e) {}
    })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login — Bibliotecário</title>
    <link rel="stylesheet" href="/tokens.css">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#e8491d">
    <link rel="apple-touch-icon" href="/img/icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Libro">
    <link rel="stylesheet" href="/toast.css">
    <link rel="stylesheet" href="/theme.css">
</head>
<body>
    <button class="btn-tema" onclick="libroAlternarTema()" aria-label="Alternar modo escuro" title="Modo escuro">🌙</button>

    <div class="container">
        <!-- Lado esquerdo — mesmo estilo do original -->
        <div class="left-side">
            <img src="g10.png" alt="logo">
            <div class="welcome-content">
                <h1>Bem-vindo(a)!</h1>
                <p>Área exclusiva para bibliotecários</p>
                <div class="decorative-element"></div>
            </div>
        </div>

        <!-- Lado direito -->
        <div class="right-side">
            <div class="login-container">
                <h2>Bibliotecário</h2>
                <p class="lib-subtitle">Faça login com seu e-mail e senha para acessar o painel.</p>

                <form id="form-bibliotecario" class="form">
                    <div class="form-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" placeholder="Digite seu e-mail">
                    </div>
                    <div class="form-group">
                        <label for="password">Senha</label>
                        <div class="campo-senha">
                            <input type="password" id="password" placeholder="Digite sua senha">
                            <button type="button" class="btn-olho" onclick="alternarSenha(this)" aria-label="Mostrar senha">
                                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                            </button>
                        </div>
                    </div>
                    <button type="submit" id="btn-login">Entrar</button>
                </form>

                <!-- Voltar -->
                <p class="signup-link"><a href="../login/index.html">← Voltar ao login de aluno</a></p>
            </div>
        </div>
    </div>

    <script src="/toast.js"></script>
    <script src="/theme-toggle.js"></script>
    <script src="/password-toggle.js"></script>
    <script src="bibliotecario.js" defer></script>

    <script src="/pwa-register.js"></script>
</body>
</html>
