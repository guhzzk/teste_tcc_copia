<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Libro - Login</title>

<link rel="icon" href="/img/icon-192.png">

<link rel="stylesheet" href="login.css">

<link rel="manifest" href="/manifest.json">

</head>


<body>


<main class="container">


<section class="card">


<img src="/img/icon-192.png" class="logo">


<h1>Bem-vindo de volta</h1>

<p class="subtitulo">
Entre na sua conta Libro
</p>



<form id="loginForm">



<label>Email</label>

<input 
type="email"
id="email"
placeholder="Digite seu email"
required
>



<label>Senha</label>


<div class="senha-box">


<input
type="password"
id="senha"
placeholder="Digite sua senha"
required
>


<button type="button" id="mostrarSenha">
👁
</button>


</div>



<button class="entrar" type="submit">

Entrar

</button>



<div class="links">


<a href="#">
Esqueci minha senha
</a>


<p>

Não tem conta?

<a href="/cadastro">

Criar conta

</a>

</p>


</div>


</form>



</section>



</main>



<script src="login.js"></script>


</body>

</html>
